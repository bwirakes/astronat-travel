name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Lint strategy:
      #   - On PRs: lint only files changed in the PR (block on regressions).
      #   - On push to main: full-repo lint runs informational (baseline has
      #     ~530 pre-existing issues; tracked separately for triage).
      - name: Lint (changed files only on PRs)
        if: github.event_name == 'pull_request'
        run: |
          mapfile -t CHANGED < <(git diff --name-only --diff-filter=ACMRT \
            origin/${{ github.base_ref }}...HEAD \
            -- '*.ts' '*.tsx' '*.js' '*.jsx' '*.mjs')
          if [ ${#CHANGED[@]} -eq 0 ]; then
            echo "No JS/TS files changed — skipping lint."
            exit 0
          fi
          echo "Linting ${#CHANGED[@]} changed file(s):"
          printf '  %s\n' "${CHANGED[@]}"
          bunx eslint "${CHANGED[@]}"

      - name: Lint full repo (informational, push only)
        if: github.event_name == 'push'
        continue-on-error: true
        run: bun run lint

      # Typecheck is currently non-blocking: codebase has pre-existing TS
      # errors in unrelated files (Profile shape, Notion API types, supabase
      # cookies, etc.). Surface the count for triage but don't gate PRs on
      # them. Remove `continue-on-error` once baseline is clean.
      - name: Typecheck (informational)
        continue-on-error: true
        run: bun run typecheck

      # Design-system tests are the contract for the brand pass. These MUST
      # pass — any regression here means the brand book has been violated.
      - name: Design-system tests (blocking)
        run: bun run test:design-system

      # Broader unit-test suite has ~14 pre-existing failures in unrelated
      # subsystems (couples-viewmodel thresholds, verdict bands). Surface
      # count for triage; don't block PRs until baseline is clean.
      - name: Full unit tests (informational)
        continue-on-error: true
        run: bun run test:unit

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.next/cache
          key: next-${{ runner.os }}-${{ hashFiles('bun.lock') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.css') }}
          restore-keys: |
            next-${{ runner.os }}-${{ hashFiles('bun.lock') }}-

      - name: Production build
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  e2e:
    name: Playwright (smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: verify
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: bun run test
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
